<article>
  <h2>Forgot password</h2>
  @if (submitted) {
    <p>If an account exists for that email, we've sent a link to reset your password.</p>
    <p style="margin-top: 1rem"><a [routerLink]="['/login']">Back to log in</a></p>
  } @else {
    <p>Enter your email and we'll send you a link to reset your password.</p>
    <form (ngSubmit)="submit()">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" [(ngModel)]="email" autocomplete="username" required />
      <button type="submit" [attr.aria-busy]="submitting ? 'true' : null">Send reset link</button>
      <p style="margin-top: 1rem"><a [routerLink]="['/login']">Back to log in</a></p>
    </form>
  }
</article>
